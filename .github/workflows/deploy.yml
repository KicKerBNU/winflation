name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc -b

      - name: Build
        run: npx vite build
        env:
          VITE_FMP_API_KEY: ${{ secrets.VITE_FMP_API_KEY }}

      - name: Deploy preview (pull request)
        if: github.event_name == 'pull_request'
        run: npx netlify-cli deploy --dir=dist --message="PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy production (push to master)
        if: github.event_name == 'push'
        run: npx netlify-cli deploy --dir=dist --prod --message="${{ github.event.head_commit.message }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
