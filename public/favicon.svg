  </defs>

  <!-- Rising bar chart -->
  <rect x="4"  y="22" width="5" height="7"  rx="1.5" fill="white" fill-opacity="0.45"/>
  <rect x="12" y="17" width="5" height="12" rx="1.5" fill="white" fill-opacity="0.7"/>
  <rect x="20" y="14" width="5" height="15" rx="1.5" fill="white"/>

  <!-- Arrow above tallest bar -->
